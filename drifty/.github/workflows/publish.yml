name: Publish to PyPI

on:
  release:
    types: [published]

  # Allow manual trigger for testing the publish pipeline
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Dry run (build only, do not publish)"
        required: false
        default: "true"
        type: choice
        options: ["true", "false"]

jobs:
  build:
    name: Build distribution
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install Poetry
        uses: snok/install-poetry@v1
        with:
          version: latest

      - name: Verify version matches release tag
        if: github.event_name == 'release'
        run: |
          TAG="${GITHUB_REF#refs/tags/v}"
          PYPROJECT_VERSION=$(poetry version --short)
          if [ "$TAG" != "$PYPROJECT_VERSION" ]; then
            echo "❌ Tag v$TAG does not match pyproject.toml version $PYPROJECT_VERSION"
            exit 1
          fi
          echo "✅ Version match confirmed: $PYPROJECT_VERSION"

      - name: Install dependencies
        run: poetry install --no-interaction

      - name: Run tests before publishing
        run: poetry run pytest -v

      - name: Build package
        run: poetry build

      - name: Inspect build artifacts
        run: |
          ls -lh dist/
          poetry run python -c "import zipfile, sys; zf = zipfile.ZipFile('$(ls dist/*.whl)'); print('\n'.join(zf.namelist()))"

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/

  publish:
    name: Publish to PyPI
    needs: build
    runs-on: ubuntu-latest
    if: github.event_name == 'release' || (github.event_name == 'workflow_dispatch' && inputs.dry_run == 'false')

    environment:
      name: pypi
      url: https://pypi.org/project/drifty/

    permissions:
      id-token: write  # Required for PyPI Trusted Publisher (no API key needed)

    steps:
      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      - name: Publish to PyPI (Trusted Publisher)
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          print-hash: true