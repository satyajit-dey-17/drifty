name: Publish to PyPI

on:
  push:
    tags:
      - "v*"

  workflow_dispatch:
    inputs:
      dry_run:
        description: "Dry run (build only, do not publish)"
        required: false
        default: "true"
        type: choice
        options: ["true", "false"]

jobs:
  build:
    name: Build distribution
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install Poetry
        uses: snok/install-poetry@v1
        with:
          version: latest

      - name: Verify version matches release tag
        if: github.event_name == 'push'
        run: |
          TAG="${GITHUB_REF#refs/tags/v}"
          PYPROJECT_VERSION=$(poetry version --short)
          if [ "$TAG" != "$PYPROJECT_VERSION" ]; then
            echo "❌ Tag v$TAG does not match pyproject.toml version $PYPROJECT_VERSION"
            exit 1
          fi
          echo "✅ Version match confirmed: $PYPROJECT_VERSION"

      - name: Install dependencies
        run: poetry install --no-interaction

      - name: Run tests before publishing
        run: poetry run pytest -v

      - name: Clean dist before build
        run: rm -rf dist/

      - name: Build package
        run: poetry build

      - name: Inspect build artifacts
        run: ls -lh dist/

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/

  release:
    name: Create GitHub Release
    needs: build
    runs-on: ubuntu-latest
    if: github.event_name == 'push'

    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Extract changelog for this version
        id: changelog
        run: |
          TAG="${GITHUB_REF#refs/tags/v}"
          # Extract the block between this version header and the next
          NOTES=$(awk "/^## \[${TAG}\]/{found=1; next} found && /^## \[/{exit} found{print}" CHANGELOG.md)
          # Write to file to preserve newlines
          echo "$NOTES" > release_notes.txt
          echo "tag=$TAG" >> $GITHUB_OUTPUT

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: "v${{ steps.changelog.outputs.tag }}"
          body_path: release_notes.txt
          draft: false
          prerelease: false

  publish:
    name: Publish to PyPI
    needs: release
    runs-on: ubuntu-latest
    if: github.event_name == 'push' || (github.event_name == 'workflow_dispatch' && inputs.dry_run == 'false')

    environment:
      name: pypi
      url: https://pypi.org/project/drifty/

    permissions:
      id-token: write

    steps:
      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      - name: Publish to PyPI (Trusted Publisher)
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          print-hash: true